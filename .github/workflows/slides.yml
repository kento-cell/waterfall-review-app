name: Build Slides

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - ".github/workflows/slides.yml"
  pull_request:
    branches: [main]
    paths:
      - "slides/**"
      - ".github/workflows/slides.yml"
  workflow_dispatch:

jobs:
  build:
    name: Generate PPTX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slides
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build slides
        run: npm run build

      - name: Upload PPTX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Waterfall_Review_App_Overview-pptx
          path: slides/dist/*.pptx
          if-no-files-found: error
          retention-days: 30
